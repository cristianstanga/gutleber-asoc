version: '3.8'

# Deploy simple — acceso por IP:puerto, sin dominio ni SSL
# Acceso: http://82.29.60.243:8082

networks:
  gutleber-internal:
    driver: bridge

volumes:
  gutleber-postgres-data:
  gutleber-uploads:

services:

  gutleber-postgres:
    image: postgres:16-alpine
    networks:
      - gutleber-internal
    environment:
      POSTGRES_DB: gutleber_db
      POSTGRES_USER: gutleber
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - gutleber-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gutleber -d gutleber_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  gutleber-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    networks:
      - gutleber-internal
    environment:
      DATABASE_URL: postgresql://gutleber:${DB_PASSWORD}@gutleber-postgres:5432/gutleber_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-https://app.gutleberyasociados.com}
      PUBLIC_URL: ${APP_URL:-https://app.gutleberyasociados.com}
      APP_URL: ${APP_URL:-https://app.gutleberyasociados.com}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      INSTAGRAM_ACCESS_TOKEN: ${INSTAGRAM_ACCESS_TOKEN:-}
      INSTAGRAM_ACCOUNT_ID: ${INSTAGRAM_ACCOUNT_ID:-}
      CATALOGO_WA_NUMERO: ${CATALOGO_WA_NUMERO:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_BUSINESS_ACCOUNT_ID: ${WHATSAPP_BUSINESS_ACCOUNT_ID}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_VERIFY_TOKEN: gutleber_webhook_2026
      NOTIF_OPERADORES: ${NOTIF_OPERADORES:-}
      SMTP_PASS: ${SMTP_PASS}
    volumes:
      - gutleber-uploads:/app/apps/api/uploads
      - /root/gutleber-backups:/app/apps/api/backups
    depends_on:
      gutleber-postgres:
        condition: service_healthy
    restart: unless-stopped

  gutleber-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    networks:
      - gutleber-internal
    ports:
      - "8082:80"        # Acceso: http://IP:8082
    depends_on:
      - gutleber-api
    restart: unless-stopped
