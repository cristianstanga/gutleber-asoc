server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # SPA routing — todas las rutas van a index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy a la API
  # - Sin dominio (docker-compose.simple.yml): nginx reenvía a gutleber-api:3001
  # - Con dominio (docker-compose.production.yml): Traefik intercepta antes de llegar aquí
  location /api {
    proxy_pass http://gutleber-api:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
