<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 90" width="400" height="90">
  <title>Gutleber &amp; Asociados — Logo oscuro</title>
  <rect width="400" height="90" fill="#060E1C" rx="4"/>
  <defs>
    <clipPath id="pin-d">
      <path d="M8,40 A33,33 0 1,1 74,40 L41,92 Z"/>
    </clipPath>
  </defs>
  <!-- PIN con borde cobre para contraste -->
  <path d="M8,40 A33,33 0 1,1 74,40 L41,92 Z"
    fill="#0F172A" stroke="#B45309" stroke-width="2" stroke-linejoin="round"/>
  <g clip-path="url(#pin-d)">
    <polygon points="41,18 74,46 68,72 14,72 8,46" fill="#B45309"/>
    <rect x="22" y="56" width="8" height="14" rx="1.5" fill="#F8F7F4" opacity="0.4"/>
    <rect x="32" y="50" width="8" height="20" rx="1.5" fill="#F8F7F4" opacity="0.6"/>
    <rect x="42" y="44" width="8" height="26" rx="1.5" fill="#F8F7F4" opacity="0.82"/>
    <rect x="52" y="38" width="8" height="32" rx="1.5" fill="#F8F7F4"/>
  </g>
  <polyline points="6,46 41,18 76,46" fill="none" stroke="#F8F7F4" stroke-width="2.8"
    stroke-linecap="round" stroke-linejoin="round" clip-path="url(#pin-d)"/>
  <!-- Separador -->
  <line x1="92" y1="16" x2="92" y2="72" stroke="#B45309" stroke-width="0.8" opacity="0.5"/>
  <!-- Wordmark en crema -->
  <text x="106" y="36" font-family="Georgia, 'Times New Roman', serif"
    font-size="24" font-weight="bold" fill="#F8F7F4" letter-spacing="2">GUTLEBER</text>
  <line x1="107" y1="44" x2="148" y2="44" stroke="#B45309" stroke-width="0.8"/>
  <text x="196" y="48" font-family="Georgia, 'Times New Roman', serif"
    font-size="10" fill="#B45309" letter-spacing="1" text-anchor="middle">&amp; ASOCIADOS</text>
  <line x1="244" y1="44" x2="285" y2="44" stroke="#B45309" stroke-width="0.8"/>
  <text x="196" y="62" font-family="Arial, Helvetica, sans-serif"
    font-size="9" fill="#F8F7F4" letter-spacing="3.5" text-anchor="middle" opacity="0.7">INMOBILIARIA BOUTIQUE</text>
</svg>
